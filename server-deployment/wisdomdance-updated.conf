# 终极 Nginx 配置 V14 - 支持多平台部署
# 解决多路径部署下的 SPA 路由及静态资源冲突

server {
    server_name wisdomdance.cn www.wisdomdance.cn;
    root /var/www/wisdomdance/dist;
    index index.html;

    # 天气API代理
    location /weather-api/ {
        proxy_pass http://d1.weather.com.cn/;
        proxy_set_header Referer http://www.weather.com.cn/;
        proxy_set_header Host d1.weather.com.cn;
        proxy_set_header Accept-Encoding "";
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "max-age=600";
    }

    # 1. 监测平台 (jctx)
    location /jctx/ {
        alias /var/www/jctx/;
        index index.html;
        try_files $uri $uri/ /jctx/index.html;
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
        }
    }

    # 2. 水利平台 (ycsl)
    location /ycsl/ {
        alias /var/www/ycsl/;
        index index.html;
        try_files $uri $uri/ /ycsl/index.html;
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # 3. 宜川监测大屏 (ycjctx)
    location /ycjctx/ {
        alias /var/www/html/ycjctx/;
        index index.html;
        try_files $uri $uri/ /ycjctx/index.html;
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
        }
    }

    # 4. 主站 (root)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 全局静默处理 favicon.ico
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }
    
    location = /jctx/favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/wisdomdance.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wisdomdance.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name wisdomdance.cn www.wisdomdance.cn 43.153.213.134 _;
    
    root /var/www/wisdomdance/dist;
    index index.html;

    # 宜川监测大屏 (ycjctx) - HTTP访问
    location /ycjctx/ {
        alias /var/www/html/ycjctx/;
        index index.html;
        try_files $uri $uri/ /ycjctx/index.html;
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
        }
    }

    location /jctx/ {
        alias /var/www/jctx/;
        index index.html;
        try_files $uri $uri/ /jctx/index.html;
    }
    
    location /ycsl/ {
        alias /var/www/ycsl/;
        index index.html;
        try_files $uri $uri/ /ycsl/index.html;
    }

    location / {
        if ($host ~* ^(wisdomdance.cn|www.wisdomdance.cn)$) {
            return 301 https://$host$request_uri;
        }
        try_files $uri $uri/ /index.html;
    }
}
