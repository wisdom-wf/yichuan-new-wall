server {
    listen 80;
    server_name 43.153.213.134;
    
    # 宜川监测大屏子路径
    location /ycjctx/ {
        alias /var/www/html/ycjctx/;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 静态资源配置
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # 主路径（如果需要）
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ =404;
    }
}